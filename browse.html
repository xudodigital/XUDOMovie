<!DOCTYPE html>
<html lang="en">
    <head>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-FZLP60XCL2"></script>
        <script>
            window.dataLayer = window.dataLayer || [];

            function gtag() {
                dataLayer.push(arguments);
            }
            gtag('js', new Date());
            gtag('config', 'G-FZLP60XCL2');
        </script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#0f0f0f">
        <title>Browse - XUDOMovie</title>
        <meta name="robots" content="noindex, nofollow">
        <link rel="canonical" href="https://xudomovie.us/">
        <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" href="icon.svg" type="image/svg+xml">
    </head>
    <body>
        <div id="global-header-placeholder"></div>
        <div class="media-grid-container">
            <div class="ad-banner-container ad-mb-5">
                <div class="ad-banner ad-transparent">
                    <iframe src="ad-banner.html" scrolling="no" class="ad-iframe"></iframe>
                </div>
            </div>
            <h2 class="page-title" id="page-title">Loading...</h2>
            <div id="genre-list" class="genre-scroll"></div>
            <div class="media-grid" id="browse-grid"></div>
            <div class="load-more-container">
                <button id="load-more-btn" class="load-more-btn">Load More</button>
            </div>
        </div>
        <!-- Theme toggle: fixed bottom-right, same position as Project Vietnam -->
        <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Dark/Light Mode" title="Toggle Theme">
            <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <div id="global-footer-placeholder"></div>
        <script src="js/global-header.js"></script>
        <script src="js/global-footer.js"></script>
        <script src="js/main.js"></script>
        <!-- Trailer modal: placed AFTER scripts, uses .trailer-modal CSS class — same as Project Vietnam -->
        <div id="trailer-modal" class="trailer-modal">
            <div class="trailer-content">
                <span class="close-trailer" onclick="window.closeTrailer()">&times;</span>
                <div id="trailer-video-container" style="width:100%; height:100%;"></div>
            </div>
        </div>
    </body>
</html>
