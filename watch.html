<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FZLP60XCL2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FZLP60XCL2');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f0f">
    
    <title>Watch Full Movie & Streaming - XUDOMovie</title>
    <meta name="description" content="Watch your favorite movies and TV series in HD on XUDOMovie. Start streaming now!">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://xudomovie.us/watch.html">
    
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body>
    <header class="movie-header">
        <a href="index.html" class="logo" aria-label="XUDOMovie Home">XUDO<span>MOVIE</span></a>
        
        <nav class="nav-links" id="nav-menu">
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-input" placeholder="Search movies, TV shows, actors..." aria-label="Search Movies, TV Shows, Actors" onkeypress="handleEnter(event)" oninput="toggleClearButton()">
                <button id="clear-btn" class="search-clear" onclick="clearSearch()" aria-label="Clear Search">✕</button>
                <button class="search-btn" onclick="executeSearch()" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            <a href="browse.html?type=favorites" class="header-fav-btn" aria-label="My Favorites">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </a>
        </nav>
    </header>

    <div class="player-wrapper" id="player-container"></div>

    <div class="ad-banner-container" style="margin: 20px auto 0 auto;">
        <div class="ad-banner" style="background: transparent; border: none;">
            <iframe src="ad-banner.html" width="100%" height="90" frameborder="0" scrolling="no" style="max-width: 728px; border:none; overflow:hidden;"></iframe>
        </div>
    </div>

    <div class="watch-container" style="padding-top: 20px;">
        <div class="control-bar" id="control-bar">
            <div class="server-control">
                <span class="server-label" style="color: #b3b3b3; margin-right: 10px;">Servers:</span>
                <button class="server-btn active" onclick="changeServer(1)">1</button>
                <button class="server-btn" onclick="changeServer(2)">2</button>
                <button class="server-btn" onclick="changeServer(3)">3</button>
                <button class="server-btn" onclick="changeServer(4)">4</button>
            </div>
        </div>

        <div class="tv-controls" id="tv-controls" style="display:none;">
            <div class="tv-controls-header">
                <h3>Select Episode</h3>
                <select id="season-select" class="season-select"></select>
            </div>
            <div class="episodes-grid" id="episodes-grid"></div>
        </div>

        <div class="movie-info">
            <div class="poster-container">
                <img id="detail-poster" src="https://via.placeholder.com/500x750?text=Loading" alt="Movie Poster">
            </div>
            <div class="details-container">
                <h1 id="detail-title">Loading...</h1>
                
                <div class="metadata">
                    <span id="detail-rating" class="rating">--</span>
                    <span id="detail-year" class="year">----</span>
                    <span id="detail-cert" class="quality" style="display:none;">--</span>
                    <span id="detail-runtime" class="quality">-- min</span>
                    <span class="quality">HD</span>
                </div>

                <div class="genres" id="detail-genres" style="margin-bottom: 20px;"></div>
                <p class="overview" id="detail-overview">Fetching description...</p>
                
                <div id="action-group" style="margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap;">
                    
                    <button class="share-btn" onclick="window.shareMovie()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg> SHARE
                    </button>

                    <button class="trailer-btn" onclick="openTrailer()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg> TRAILER
                    </button>
                    
                </div>

                <div class="cast-section" style="margin-top: 30px;">
                    <h3 style="color: #fff; font-size: 1.1rem; margin-bottom: 15px;" id="cast-title">Top Cast</h3>
                    <div id="cast-list" class="cast-list"></div>
                </div>
            </div>
        </div>

        <div class="ad-banner-container" style="margin: 40px auto 10px auto;">
            <div class="ad-banner" style="background: transparent; border: none;">
                <iframe src="ad-banner.html" width="100%" height="90" frameborder="0" scrolling="no" style="max-width: 728px; border:none; overflow:hidden;"></iframe>
            </div>
        </div>

        <div class="recommendations-section" style="margin-top: 50px;">
            <h2 class="section-title">You May Also Like</h2>
            <div class="horizontal-slider" id="rec-slider"></div>
        </div>
    </div> <div id="global-footer-placeholder"></div>
    <script src="https://xudotrailer.us/js/global-footer.js"></script>
    <script src="js/main.js"></script>
    <div id="trailer-modal" class="trailer-modal">
        <div class="trailer-content">
            <span class="close-trailer" onclick="closeTrailer()">&times;</span>
            <div id="trailer-video-container" style="width:100%; height:100%;"></div>
        </div>
    </div>
</body>
</html>
